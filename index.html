<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>jQuery Part 3 Demo</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
    <h1 id="heading">Ulster University</h1>

    <div id="info">
        <p class="details">Welcome to Ulster</p>
        <a id="ulink" href="https://www.ulster.ac.uk" target="_blank">Visit Ulster</a>
        <img id="ulogo" src="logo.png" width="150" height="150" alt="Ulster Logo">
    </div>
    <div id="form-section">
        <input type="text" id="nameInput" placeholder="Enter your name">
        <button id="getVal">Get Input Value</button>
        <button id="setVal">Set Input Value</button>
    </div>
    <div id="actions">
        <button id="gettext">Get Text</button>
        <button id="settext">Set Text</button>
        <button id="gethtml">Get Html</button>
        <button id="sethtml">Set Html</button>
        <button id="getattr">Get Attribute</button>
        <button id="setattr">Set Attribute</button>
    </div>

    <div id="output"></div>
 

  <script src="script.js"></script>
</body>
</html>
